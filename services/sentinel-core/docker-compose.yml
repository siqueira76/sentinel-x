version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sentinel-core-postgres
    environment:
      POSTGRES_DB: sentinel_core
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
    ports:
      - "5432:5432"
    volumes:
      - sentinel-core-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_core"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  sentinel-core-postgres-data: